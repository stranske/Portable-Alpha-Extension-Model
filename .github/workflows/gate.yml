# .github/workflows/gate.yml
name: gate
on:
  pull_request:
permissions:
  contents: read
jobs:
  core-tests:
    uses: ./.github/workflows/ci.yml
    with:
      python: "3.12"
      marker: "not quarantine and not slow"
  docker-smoke:
    uses: ./.github/workflows/docker.yml
    with:
      mode: "smoke"
  gate:
    runs-on: ubuntu-latest
    needs: [core-tests, docker-smoke]
    steps:
      - run: echo "All required jobs passed."
